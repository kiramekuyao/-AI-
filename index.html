<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耀AI-香蕉独立版 (云端互通版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #0f1923; color: #fff; overflow: hidden; }
        .font-tactical { font-family: 'Teko', sans-serif; }
        
        .prompt-item {
            background-color: #1f2326; border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px; transition: border-color 0.2s, background-color 0.2s;
            display: flex; align-items: stretch; 
            height: 85px; overflow: hidden; user-select: none; position: relative;
            min-width: 0; flex-shrink: 0; width: 100%;
            box-sizing: border-box;
        }
        .prompt-item:hover { border-color: #ff4655; background-color: rgba(255, 70, 85, 0.05); }
        .drag-zone .prompt-item, #sharedGrid .prompt-item { cursor: grab; }
        .drag-zone .prompt-item:active, #sharedGrid .prompt-item:active { cursor: grabbing; }
        
        .admin-card { 
            cursor: pointer; display: flex; flex-direction: column; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; height: 160px; background-color: #1a1e23;
        }
        .admin-card:hover { 
            border-color: #ffc107; background-color: rgba(255, 193, 7, 0.05); 
            transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.6); 
        }
        .admin-card-root:hover { 
            border-color: #ff4655; background-color: rgba(255, 70, 85, 0.05); 
        }

        .id-badge {
            position: absolute; top: 0; left: 0; padding: 2px 8px; background: rgba(0, 255, 255, 0.1); color: cyan;
            font-family: 'Teko', sans-serif; font-size: 14px; border-bottom-right-radius: 8px;
            border-right: 1px solid rgba(0, 255, 255, 0.2); border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        }
        
        /* 词汇卡片文字区：右边永远锁死，不随窗口伸缩 */
        .prompt-content {
            flex: 1 1 0%; 
            min-width: 0;
            padding: 0 80px 0 15px; 
            display: flex; align-items: center;
            font-weight: bold; font-size: 1.05rem; 
            overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
        }
        
        .fav-action {
            width: 65px; min-width: 65px; max-width: 65px;
            background-color: rgba(255, 255, 255, 0.02); border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
            flex-shrink: 0; flex-grow: 0;
        }
        .fav-action i { font-size: 26px; color: rgba(255, 255, 255, 0.15); pointer-events: none; }
        .fav-count-text { font-family: 'Teko', sans-serif; font-size: 20px; font-weight: 600; color: rgba(255, 255, 255, 0.25); pointer-events: none; line-height: 1; }
        .is-fav { border-color: rgba(255, 193, 7, 0.4) !important; }
        .is-fav .fav-action i { color: #ffc107; text-shadow: 0 0 15px rgba(255, 193, 7, 0.6); }
        .is-fav .fav-count-text { color: #ffc107; }
        .sortable-ghost { opacity: 0.3; background: #ff4655 !important; border: 2px dashed #ff4655; pointer-events: none; }
        .tab-drop-target { background-color: rgba(255, 193, 7, 0.15) !important; border-bottom-color: #ffc107 !important; color: #ffc107 !important; }
        
        .empty-placeholder { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: #4b5563; font-size: 0.875rem; font-family: 'Teko', sans-serif; 
            font-style: italic; pointer-events: none; width: 100%; z-index: 0;
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; } 
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: #0f1923; }
        
        .auth-input { width: 100%; background: #0f1923; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 10px 14px; color: white; outline: none; transition: border-color 0.2s; }
        .auth-input:focus { border-color: #3b82f6; }
        .auth-label { display: block; text-transform: uppercase; font-family: 'Teko', sans-serif; letter-spacing: 0.05em; color: #9ca3af; font-size: 0.875rem; margin-bottom: 4px; }
    </style>
</head>
<body class="h-screen flex flex-col relative">
    <nav class="h-14 bg-[#0f1923] border-b border-white/10 flex items-center justify-center shrink-0 z-50 relative">
        <div class="flex items-center gap-3">
            <img src="Logo.jpg" alt="耀AI-香蕉独立版 Logo" class="w-10 h-10 rounded-md object-cover shadow-[0_0_12px_rgba(0,255,255,0.2)] border border-white/5" onerror="this.src='https://via.placeholder.com/40'">
            <div class="flex flex-col justify-center">
                <h1 class="font-tactical text-2xl text-white tracking-widest uppercase leading-none mt-1">耀AI-香蕉独立版</h1>
                <p class="text-[10px] text-gray-400 font-bold tracking-widest font-tactical leading-none mt-0.5">TERMINAL OS - CLOUD EDITION</p>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex p-4 gap-6 max-w-[1920px] mx-auto w-full relative" style="overflow: hidden auto; min-width: 700px;">
        
        <aside id="terminalSidebar" class="w-[420px] flex flex-col shrink-0 border border-white/10 bg-[#0f1923] shadow-2xl relative transition-all duration-300 ease-in-out z-40">
            <div id="toggleTerminalBtn" class="absolute -right-5 top-1/2 -translate-y-1/2 w-5 h-20 bg-[#1f2326] border-y border-r border-white/10 flex items-center justify-center cursor-pointer text-gray-500 hover:text-white hover:bg-[#ff4655] transition-all rounded-r-md z-50 shadow-[4px_0_10px_rgba(0,0,0,0.3)]">
                <i id="toggleTerminalIcon" class="fa-solid fa-chevron-left text-[10px] transition-transform duration-300"></i>
            </div>

            <div class="absolute left-0 top-0 bottom-0 w-1 bg-[#ff4655] shadow-[0_0_10px_#ff4655]"></div>
            <div class="bg-[#1f2326] p-3 border-b border-white/10 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <span class="font-tactical text-xl text-white tracking-widest uppercase"><i class="fa-solid fa-fire mr-2 text-[#ff4655]"></i>焚决终端</span>
                    <button id="shareTerminalBtn" class="font-tactical text-xl text-blue-400 hover:text-white border border-blue-400/20 px-3 rounded bg-blue-400/5 transition-all uppercase">+ 共享</button>
                </div>
                <button id="clearBtn" class="text-[10px] text-gray-500 hover:text-red-500 font-bold uppercase">Clear</button>
            </div>
            <textarea id="promptArea" maxlength="50000" class="flex-grow bg-transparent text-gray-100 p-5 font-mono text-sm outline-none resize-none leading-relaxed" placeholder="// 等待指令注入..."></textarea>
            <div class="p-4 border-t border-white/10 bg-[#1f2326] space-y-4">
                <div class="flex justify-between items-center">
                    <label class="flex items-center gap-2 cursor-pointer text-gray-400 hover:text-white font-tactical text-lg uppercase transition-colors"><input type="checkbox" id="newlineToggle" class="w-4 h-4 accent-[#ff4655]"> 自动换行序号</label>
                    <span id="charCount" class="text-[#ff4655] font-tactical text-xl tracking-wide">剩余 50000 字</span>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <button id="saveTerminalBtn" class="bg-[#ffc107] py-3 font-bold text-sm uppercase rounded shadow-lg shadow-yellow-900/40 hover:bg-[#d4a000] text-black">存入收藏</button>
                    <button id="copyBtn" class="bg-[#ff4655] py-3 font-bold text-sm uppercase rounded shadow-lg shadow-red-900/40 hover:bg-[#d43030]">复制指令</button>
                    <button id="backBtn" class="bg-gray-700 py-3 font-bold text-sm uppercase rounded hover:bg-gray-600">回退一步</button>
                </div>
            </div>
        </aside>

        <section class="flex-grow flex flex-col border border-white/10 bg-[#161b22] overflow-y-auto overflow-x-auto relative" id="mainLibrary" style="min-width: 600px;">
            <div class="p-6 w-full" style="min-width: 560px;">
                
                <div id="favoritesRoot">
                    <div class="flex items-center gap-2 mb-3">
                        <div id="loginBtn" class="cursor-pointer px-5 py-2 text-sm bg-blue-600/20 border border-blue-500/50 rounded text-blue-300 hover:bg-blue-600/40 transition-all font-bold shrink-0">
                            <i class="fa-solid fa-user-shield mr-1"></i> <span id="loginText">登录 / 注册</span>
                        </div>
                        <div id="logoutBtn" class="hidden cursor-pointer px-4 py-2 text-sm bg-red-600/20 border border-red-500/50 rounded text-red-400 hover:bg-red-600/40 transition-all font-bold shrink-0" title="登出">
                            <i class="fa-solid fa-right-from-bracket"></i>
                        </div>
                        <div id="syncStatus" class="flex items-center gap-1.5 px-3 py-1.5 bg-black/30 border border-white/5 rounded text-xs font-tactical text-gray-500 shrink-0">
                            <i class="fa-solid fa-cloud-arrow-down"></i> 系统初始化...
                        </div>
                    </div>
                    <div class="flex items-center gap-6 mb-8">
                        <h3 id="tabFavorites" class="cursor-pointer font-tactical text-2xl text-[#ffc107] uppercase tracking-widest flex items-center gap-2 border-b-2 border-[#ffc107] pb-1 transition-all shrink-0">
                            <i class="fa-solid fa-box-archive"></i> 云端收藏夹
                        </h3>
                        <h3 id="tabMyShares" class="cursor-pointer font-tactical text-2xl text-gray-500 hover:text-blue-400 uppercase tracking-widest flex items-center gap-2 border-b-2 border-transparent pb-1 transition-all shrink-0">
                            <i class="fa-solid fa-share-nodes"></i> 共享管理
                        </h3>
                        <h3 id="tabAdmin" class="hidden cursor-pointer font-tactical text-2xl text-gray-500 hover:text-red-400 uppercase tracking-widest flex items-center gap-2 border-b-2 border-transparent pb-1 transition-all shrink-0">
                            <i class="fa-solid fa-shield-halved"></i> 共享管理(ROOT)
                        </h3>
                    </div>
                    
                    <div id="favWrapper" class="block">
                        <div class="relative w-full max-w-md mb-4" id="favSearchContainer">
                            <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                            <input type="text" id="favSearchInput" placeholder="检索收藏夹档案..." class="bg-[#0f1923] border border-white/10 text-lg pl-12 pr-4 py-2.5 rounded outline-none text-white w-full font-tactical tracking-wide shadow-inner transition-all focus:border-[#ffc107]">
                        </div>
                        
                        <div class="flex items-center gap-3 mb-6" id="favActionButtons">
                            <button id="addGroupBtn" class="text-sm bg-[#ffc107]/10 border border-[#ffc107]/30 px-5 py-2.5 rounded hover:bg-[#ffc107]/20 font-bold uppercase tracking-tighter text-[#ffc107] transition-colors shrink-0">
                                + 新建收藏
                            </button>
                            <button id="importJsonBtn" class="bg-green-500/10 text-green-400 border border-green-500/30 px-5 py-2.5 rounded text-sm font-bold hover:bg-green-500/20 transition-colors flex items-center gap-1.5 shadow-sm" title="支持导入JSON或魔导书TXT格式">
                                <i class="fa-solid fa-file-import"></i> 导入
                            </button>
                            <button id="exportJsonBtn" class="bg-blue-500/10 text-blue-400 border border-blue-500/30 px-5 py-2.5 rounded text-sm font-bold hover:bg-blue-500/20 transition-colors flex items-center gap-1.5 shadow-sm">
                                <i class="fa-solid fa-file-export"></i> 导出
                            </button>
                        </div>
                        
                        <div id="groupsContainer" class="block"></div>
                    </div>
                    
                    <div id="mySharesContainer" class="hidden flex-col gap-4">
                        <div class="flex justify-between items-center bg-[#161b22] p-4 rounded-lg border border-blue-500/20 shadow-[0_0_15px_rgba(59,130,246,0.05)]">
                            <span class="text-blue-400 font-tactical text-lg mr-6 tracking-wider shrink-0"><i class="fa-solid fa-circle-info mr-2"></i>点击卡片查看并修改详细内容</span>
                            <div class="flex gap-4 border-l border-white/10 pl-6 shrink-0 flex-wrap">
                                <button id="myBatchDelete" class="bg-red-500/10 text-red-500 border border-red-500/30 px-4 py-2 rounded text-sm font-bold hover:bg-red-500/30 transition-colors shadow-sm"><i class="fa-solid fa-trash-can mr-2"></i>批量删除</button>
                                <button id="mySelectAllBtn" class="bg-gray-500/10 text-gray-400 border border-gray-500/30 px-4 py-2 rounded text-sm font-bold hover:bg-gray-500/30 hover:text-white transition-colors shadow-sm"><i class="fa-solid fa-check-double mr-1"></i>全选当页</button>
                                <button id="myInverseSelectBtn" class="bg-gray-500/10 text-gray-400 border border-gray-500/30 px-4 py-2 rounded text-sm font-bold hover:bg-gray-500/30 hover:text-white transition-colors shadow-sm"><i class="fa-solid fa-arrows-rotate mr-1"></i>反选当页</button>
                            </div>
                        </div>
                        <div class="relative w-full max-w-md mb-2 mt-2">
                            <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                            <input type="text" id="mySharesSearchInput" placeholder="检索我的共享 (支持名称/ID)..." class="bg-[#0f1923] border border-white/10 text-lg pl-12 pr-4 py-2.5 rounded outline-none text-white w-full font-tactical tracking-wide shadow-inner transition-all focus:border-blue-400">
                        </div>
                        <div id="mySharesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4"></div>
                        <div id="mySharesPagination" class="flex justify-center items-center gap-4 mt-2"></div>
                    </div>
                    
                    <div id="adminContainer" class="hidden flex-col gap-4">
                        <div id="subAdminManager" class="hidden bg-[#161b22] p-4 rounded-lg border border-purple-500/20 shadow-[0_0_15px_rgba(168,85,247,0.05)] mb-2">
                            <h4 class="font-tactical text-xl text-purple-400 mb-3 flex items-center gap-2"><i class="fa-solid fa-users-gear"></i> 子管理员白名单 (ROOT专属)</h4>
                            <div class="flex gap-4 mb-4">
                                <input type="text" id="newSubAdminAccount" placeholder="输入新增管理员账户名..." class="bg-[#0f1923] border border-white/10 px-3 py-2 rounded outline-none text-white w-64 text-sm focus:border-purple-400 transition-all">
                                <button id="addSubAdminBtn" class="bg-purple-500/10 text-purple-400 border border-purple-500/30 px-4 py-2 rounded text-sm font-bold hover:bg-purple-500/30 transition-colors"><i class="fa-solid fa-plus mr-1"></i> 授权管理员</button>
                            </div>
                            <div class="flex flex-wrap gap-2 max-h-32 overflow-y-auto" id="subAdminList"></div>
                        </div>
                        <div class="flex justify-between items-center bg-[#161b22] p-4 rounded-lg border border-red-500/20 shadow-[0_0_15px_rgba(239,68,68,0.05)] flex-wrap gap-4">
                            <div class="flex items-center gap-4 shrink-0">
                                <span class="text-[#ff4655] font-tactical text-lg mr-2 tracking-wider"><i class="fa-solid fa-circle-info mr-2"></i>点击卡片即可编辑词汇</span>
                                <div class="flex gap-4 border-l border-white/10 pl-6 shrink-0 flex-wrap">
                                    <button id="adminBatchDelete" class="bg-red-500/10 text-red-500 border border-red-500/30 px-4 py-2 rounded text-sm font-bold hover:bg-red-500/30 transition-colors shadow-sm"><i class="fa-solid fa-trash-can mr-2"></i>批量删除</button>
                                    <button id="adminSelectAllBtn" class="bg-gray-500/10 text-gray-400 border border-gray-500/30 px-4 py-2 rounded text-sm font-bold hover:bg-gray-500/30 hover:text-white transition-colors shadow-sm"><i class="fa-solid fa-check-double mr-1"></i>全选当页</button>
                                    <button id="adminInverseSelectBtn" class="bg-gray-500/10 text-gray-400 border border-gray-500/30 px-4 py-2 rounded text-sm font-bold hover:bg-gray-500/30 hover:text-white transition-colors shadow-sm"><i class="fa-solid fa-arrows-rotate mr-1"></i>反选当页</button>
                                </div>
                            </div>
                            <div class="flex items-center gap-3 shrink-0">
                                <span class="text-gray-500 font-tactical tracking-widest text-lg">ADMIN SORT:</span>
                                <select id="adminSortSelector" class="bg-transparent border border-white/10 rounded px-3 py-2 text-gray-300 font-tactical outline-none cursor-pointer hover:text-white transition-colors">
                                    <option value="time" class="bg-white text-black font-bold">🕒 最新发布</option>
                                    <option value="favs" class="bg-white text-black font-bold">🔥 收藏量优先</option>
                                    <option value="usage" class="bg-white text-black font-bold">📋 使用量优先</option>
                                    <option value="pinned" class="bg-white text-black font-bold">📌 置顶优先</option>
                                </select>
                            </div>
                        </div>
                        <div class="relative w-full max-w-md mb-2 mt-2">
                            <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                            <input type="text" id="adminSearchInput" placeholder="ROOT管理全局检索 (支持名称/ID)..." class="bg-[#0f1923] border border-white/10 text-lg pl-12 pr-4 py-2.5 rounded outline-none text-white w-full font-tactical tracking-wide shadow-inner transition-all focus:border-red-400">
                        </div>
                        <div id="adminGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4"></div>
                        <div id="adminPagination" class="flex justify-center items-center gap-4 mt-2"></div>
                    </div>
                </div>

                <div id="publicHallContainer" class="mt-12 border-t border-white/10 pt-8">
                    <div class="flex items-center gap-4 shrink-0 mb-6">
                        <h3 class="font-tactical text-2xl text-blue-400 uppercase tracking-widest flex items-center gap-2">
                            <i class="fa-solid fa-globe"></i> 全网大厅
                        </h3>
                        <button id="refreshSharedBtn" class="text-gray-500 hover:text-blue-400 transition-colors p-2 rounded-full hover:bg-blue-400/10" title="获取最新共享词条">
                            <i class="fa-solid fa-arrows-rotate"></i>
                        </button>
                    </div>
                    
                    <div class="flex items-center gap-4 flex-wrap mb-6">
                        <div class="relative w-full max-w-lg">
                            <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                            <input type="text" id="sharedSearchInput" placeholder="检索全网共享词条或 ID (#001)..." class="bg-[#0f1923] border border-white/10 text-lg pl-12 pr-4 py-2.5 rounded outline-none text-white w-full font-tactical tracking-wide shadow-inner transition-all focus:border-blue-400">
                        </div>
                        <div class="flex items-center gap-2 bg-[#0f1923] border border-white/10 rounded px-4 py-2.5 shrink-0">
                            <span class="text-gray-500 font-tactical tracking-widest text-base">SORT:</span>
                            <select id="sortSelector" class="bg-transparent text-gray-300 text-base outline-none font-tactical cursor-pointer hover:text-white transition-colors">
                                <option value="time" class="text-black font-bold">🕒 最新发布</option>
                                <option value="favs" class="text-black font-bold">🔥 最热收藏</option>
                                <option value="usage" class="text-black font-bold">📋 最多复制</option>
                            </select>
                        </div>
                    </div>
                    
                    <div id="cloudLoading" class="text-center text-gray-500 py-10 font-tactical text-xl hidden">
                        <i class="fa-solid fa-satellite-dish fa-beat-fade mb-3 text-2xl text-blue-400"></i><br>正在链接全网数据库...
                    </div>
                    <div id="sharedGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-5 transition-opacity duration-300">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="authModal" class="fixed inset-0 bg-black/80 hidden z-[100] flex items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-[#1f2326] border border-white/20 w-full max-w-md rounded-lg shadow-[0_0_50px_rgba(0,0,0,0.8)] flex flex-col overflow-hidden">
            <div class="flex border-b border-white/10 bg-[#0f1923]">
                <button class="auth-tab flex-1 py-3 text-[#3b82f6] font-tactical text-xl tracking-widest border-b-2 border-[#3b82f6] transition-colors" data-target="loginPanel">系统登入</button>
                <button class="auth-tab flex-1 py-3 text-gray-500 hover:text-white font-tactical text-xl tracking-widest border-b-2 border-transparent transition-colors" data-target="regPanel">账户注册</button>
                <button class="auth-tab flex-1 py-3 text-gray-500 hover:text-white font-tactical text-xl tracking-widest border-b-2 border-transparent transition-colors" data-target="recPanel">找回密码</button>
                <button id="closeAuthBtn" class="px-4 text-gray-500 hover:text-red-500 transition-colors bg-white/5"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 relative">
                <div id="authLoading" class="absolute inset-0 bg-[#1f2326]/90 backdrop-blur-sm hidden flex-col items-center justify-center z-10">
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl text-blue-500 mb-2"></i>
                    <p class="text-gray-300 font-tactical tracking-widest" id="authLoadingText">处理中...</p>
                </div>
                
                <div id="loginPanel" class="auth-panel space-y-4">
                    <div>
                        <label class="auth-label">账户名</label>
                        <input type="text" id="login_account" class="auth-input" placeholder="输入您的账户名" autocomplete="off">
                    </div>
                    <div>
                        <label class="auth-label">密码</label>
                        <input type="password" id="login_pwd" class="auth-input" placeholder="输入密码">
                    </div>

    <script>
        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // 数值格式化函数
        function formatCount(numStr) {
            let n = parseInt(numStr || 0, 10);
            if (isNaN(n)) n = 0;
            if (n >= 1000000) return '100W+';
            if (n >= 10000) return Math.floor(n / 10000) + 'W+';
            if (n >= 1000) return Math.floor(n / 1000) + 'K+';
            return n.toString();
        }

        const SUPABASE_URL = 'https://mywunmfuqiotfvhbzkje.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_MhCIdEmyTEP9pU3jJKQYEQ_Dsg4s_Ux';
        
        let supabaseClient = null;
        try {
            if (window.supabase) supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch(e) { console.error("Supabase 初始化失败"); }

        const ROOT_ADMIN = '893107072@qq.com'; 
        let subAdmins = [];
        let isRootAdmin = false;
        let isAdminLoggedIn = false;
        
        let currentUser = null; 

        document.addEventListener('DOMContentLoaded', () => {
            
            const toggleTerminalBtn = document.getElementById('toggleTerminalBtn');
            const terminalSidebar = document.getElementById('terminalSidebar');
            const toggleTerminalIcon = document.getElementById('toggleTerminalIcon');
            
            toggleTerminalBtn.addEventListener('click', () => {
                terminalSidebar.classList.toggle('-ml-[420px]');
                toggleTerminalIcon.classList.toggle('rotate-180');
            });

            const promptArea = document.getElementById('promptArea');
            const charCount = document.getElementById('charCount');
            const groupsContainer = document.getElementById('groupsContainer');
            const favWrapper = document.getElementById('favWrapper');
            const mySharesContainer = document.getElementById('mySharesContainer');
            const adminContainer = document.getElementById('adminContainer');
            const sharedGrid = document.getElementById('sharedGrid');
            const cloudLoading = document.getElementById('cloudLoading');
            const syncStatusEl = document.getElementById('syncStatus');
            const publicHallContainer = document.getElementById('publicHallContainer');
            
            const editModal = document.getElementById('editModal');
            const editModalId = document.getElementById('editModalId');
            const editModalName = document.getElementById('editModalName');
            const editModalText = document.getElementById('editModalText');
            const saveEditBtn = document.getElementById('saveEditBtn');
            let currentEditItemId = null;
            
            let globalDraggedItem = null;
            let activeGroupIndex = 0;
            let hoverExpandTimer = null;
            
            const ITEMS_PER_PAGE = 12;
            const ADMIN_ITEMS_PER_PAGE = 10;
            
            let currentPageFav = 1, currentPageShared = 1, currentPageMyShares = 1, currentPageAdmin = 1;
            let favSearchQuery = '', mySharesSearchQuery = '', adminSearchQuery = '', sharedSearchQuery = '';
            let history = []; 

            let favoriteGroups = []; 
            let sharedItems = [];

            // 开启 Supabase 实时广播订阅大厅
            if (supabaseClient) {
                supabaseClient.channel('realtime_shared_prompts')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'shared_prompts' }, payload => {
                        fetchCloudData(false);
                    })
                    .subscribe();
            }

            promptArea.addEventListener('input', () => {
                const max = 50000;
                const remaining = max - promptArea.value.length;
                charCount.textContent = `剩余 ${remaining} 字`;
            });

            async function fetchCloudData(showLoading = true) {
                if (!supabaseClient) return;
                if (showLoading) {
                    cloudLoading.classList.remove('hidden');
                    sharedGrid.classList.add('hidden');
                }
                try {
                    const { data, error } = await supabaseClient.from('shared_prompts').select('*').order('time', { ascending: false });
                    if (error) throw error;
                    sharedItems = data || [];

                    let needsSave = false;
                    if (favoriteGroups && favoriteGroups.length > 0) {
                        favoriteGroups.forEach(group => {
                            group.items.forEach(item => {
                                if (item.id) {
                                    const cloudItem = sharedItems.find(i => i.id === item.id);
                                    if (cloudItem) {
                                        if (item.name !== cloudItem.name || item.text !== cloudItem.text) {
                                            item.name = cloudItem.name;
                                            item.text = cloudItem.text;
                                            needsSave = true;
                                        }
                                    }
                                }
                            });
                        });
                    }
                    if (needsSave && currentUser) {
                        supabaseClient.from('user_favorites').upsert({
                            user_id: currentUser.id,
                            fav_data: JSON.stringify(favoriteGroups)
                        }, { onConflict: 'user_id' }).then(({error}) => {
                            if(error) console.error("静默云端同步失败", error);
                        });
                    }
                } catch (err) {
                    console.error("数据拉取失败:", err);
                    syncStatusEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-red-400"></i> <span class="text-red-400">大厅数据异常</span>`;
                } finally {
                    if (showLoading) {
                        cloudLoading.classList.add('hidden');
                        sharedGrid.classList.remove('hidden');
                    }
                    renderSharedGrid();
                    if (!favWrapper.classList.contains('hidden')) renderGroups();
                    if(!mySharesContainer.classList.contains('hidden')) renderMyShares();
                    if(!adminContainer.classList.contains('hidden') && isAdminLoggedIn) renderAdminPanel();
                }
            }

            async function fetchUserFavorites(user) {
                if (!supabaseClient || !user) return;
                syncStatusEl.innerHTML = `<i class="fa-solid fa-arrows-rotate fa-spin text-blue-400"></i> <span class="text-blue-400">同步收藏中...</span>`;
                try {
                    const { data, error } = await supabaseClient.from('user_favorites').select('fav_data').eq('user_id', user.id).single();
                    if (data && data.fav_data) {
                        favoriteGroups = typeof data.fav_data === 'string' ? JSON.parse(data.fav_data) : data.fav_data;
                        if (favoriteGroups.length === 0) favoriteGroups.push({ id: 'group_default', name: '默认收藏', items: [], isDefault: true });
                        favoriteGroups.forEach(g => { 
                            if (!g.items) g.items = []; 
                            g.items.forEach(item => { if (!item._uid) item._uid = 'uid_' + Math.random().toString(36).substr(2, 9); });
                        });
                    } else {
                        favoriteGroups = [{ id: 'group_default', name: '默认收藏', items: [], isDefault: true }];
                    }
                } catch (err) {
                    favoriteGroups = [{ id: 'group_default', name: '默认收藏', items: [], isDefault: true }];
                } finally {
                    syncStatusEl.innerHTML = `<i class="fa-solid fa-check text-green-400"></i> <span class="text-green-400">云端已连接</span>`;
                    renderGroups();
                    updateSharedUI();
                }
            }

            async function initApp(user) {
                currentUser = user;
                await updateLoginUI(user);
                if (user) {
                    await fetchUserFavorites(user);
                    await fetchCloudData();
                } else {
                    favoriteGroups = [];
                    renderGroups();
                    await fetchCloudData();
                }
            }

            const localSession = localStorage.getItem('yaoai_user');
            if (localSession) { initApp(JSON.parse(localSession)); } else { initApp(null); }

            async function updateLoginUI(u) { 
                const loginBtn = document.getElementById('loginBtn');
                const logoutBtn = document.getElementById('logoutBtn');
                
                if (u) {
                    document.getElementById('loginText').textContent = escapeHTML(u.nickname);
                    loginBtn.className = "cursor-default px-5 py-2.5 text-sm bg-green-600/20 border border-green-500/50 rounded text-green-400 font-bold shadow-[0_0_10px_rgba(34,197,94,0.1)] shrink-0";
                    logoutBtn.classList.remove('hidden');

                    if(supabaseClient) {
                        try {
                            const { data } = await supabaseClient.from('admin_whitelist').select('account_name');
                            subAdmins = data ? data.map(i => i.account_name) : [];
                        } catch(e) {}
                    }
                    isRootAdmin = (u.account_name === ROOT_ADMIN);
                    isAdminLoggedIn = isRootAdmin || subAdmins.includes(u.account_name);

                    if (isAdminLoggedIn) {
                        document.getElementById('tabAdmin').classList.remove('hidden');
                        if (isRootAdmin) {
                            document.getElementById('subAdminManager').classList.remove('hidden');
                            renderSubAdmins();
                        } else {
                            document.getElementById('subAdminManager').classList.add('hidden');
                        }
                    } else {
                        document.getElementById('tabAdmin').classList.add('hidden');
                    }
                    syncStatusEl.innerHTML = `<i class="fa-solid fa-cloud text-blue-400"></i> <span class="text-blue-400">已登录</span>`;
                } else {
                    document.getElementById('loginText').textContent = "登录 / 注册";
                    loginBtn.className = "cursor-pointer px-5 py-2.5 text-sm bg-blue-600/20 border border-blue-500/50 rounded text-blue-300 hover:bg-blue-600/40 transition-all font-bold shrink-0";
                    logoutBtn.classList.add('hidden');
                    
                    syncStatusEl.innerHTML = `<i class="fa-solid fa-user-lock text-gray-500"></i> <span class="text-gray-500">未登录</span>`;
                    isAdminLoggedIn = false; isRootAdmin = false;
                    document.getElementById('tabAdmin').classList.add('hidden');
                    if(!adminContainer.classList.contains('hidden')) document.getElementById('tabFavorites').click();
                }
            }

            async function saveCloudAndSync(render = true) {
                if (render) renderGroups();
                updateSharedUI();
                
                if (!supabaseClient || !currentUser) return;
                try {
                    await supabaseClient.from('user_favorites').upsert({
                        user_id: currentUser.id,
                        fav_data: JSON.stringify(favoriteGroups)
                    }, { onConflict: 'user_id' }).then();
                } catch(e) {}
            }

            // === 认证系统逻辑 ===
            const authModal = document.getElementById('authModal');
            const authTabs = document.querySelectorAll('.auth-tab');
            const authPanels = document.querySelectorAll('.auth-panel');
            const authLoading = document.getElementById('authLoading');
            const authLoadingText = document.getElementById('authLoadingText');

            function showAuthLoading(text) {
                authLoadingText.textContent = text;
                authLoading.classList.remove('hidden');
                authLoading.classList.add('flex');
            }
            function hideAuthLoading() {
                authLoading.classList.add('hidden');
                authLoading.classList.remove('flex');
            }

            authTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    authTabs.forEach(t => { t.classList.remove('text-[#3b82f6]', 'border-[#3b82f6]'); t.classList.add('text-gray-500', 'border-transparent'); });
                    tab.classList.remove('text-gray-500', 'border-transparent'); tab.classList.add('text-[#3b82f6]', 'border-[#3b82f6]');
                    authPanels.forEach(p => p.classList.add('hidden')); document.getElementById(tab.dataset.target).classList.remove('hidden');
                });
            });

            document.getElementById('loginBtn').addEventListener('click', () => { if(!currentUser) authModal.classList.remove('hidden'); });
            document.getElementById('logoutBtn').addEventListener('click', () => {
                if(confirm("确定要登出当前账户吗？")) { localStorage.removeItem('yaoai_user'); initApp(null); }
            });
            document.getElementById('closeAuthBtn').addEventListener('click', () => authModal.classList.add('hidden'));

            // 登入
            document.getElementById('submitLogin').addEventListener('click', async () => {
                if(!supabaseClient) return alert("数据库尚未连接");
                const acc = document.getElementById('login_account').value.trim(); const pwd = document.getElementById('login_pwd').value;
                if(!acc || !pwd) return alert("请输入账户名和密码");
                showAuthLoading('正在验证账户...');
                try {
                    const { data, error } = await supabaseClient.from('app_users').select('*').eq('account_name', acc).eq('pwd', pwd).single();
                    if(error || !data) throw new Error("账户名或密码错误");
                    const userObj = { id: data.id, account_name: data.account_name, nickname: data.nickname };
                    localStorage.setItem('yaoai_user', JSON.stringify(userObj));
                    authModal.classList.add('hidden'); initApp(userObj);
                } catch(e) { alert(e.message); } finally { hideAuthLoading(); }
            });

            // 注册
            document.getElementById('submitReg').addEventListener('click', async () => {
                if(!supabaseClient) return alert("数据库尚未连接");
                const acc = document.getElementById('reg_account').value.trim(); const nick = document.getElementById('reg_nickname').value.trim();
                const pwd = document.getElementById('reg_pwd').value; const rec = document.getElementById('reg_recovery').value.trim();
                if(!acc || !nick || !pwd || !rec) return alert("所有字段均不能为空");
                if(acc.length < 3 || nick.length < 2) return alert("账户名或昵称过短");
                showAuthLoading('正在注册并分配权限...');
                try {
                    const { data: existAcc } = await supabaseClient.from('app_users').select('id').eq('account_name', acc);
                    if(existAcc && existAcc.length > 0) throw new Error("该账户名已被注册");
                    const { data: existNick } = await supabaseClient.from('app_users').select('id').eq('nickname', nick);
                    if(existNick && existNick.length > 0) throw new Error("该昵称已被使用");
                    const { data, error } = await supabaseClient.from('app_users').insert([{ account_name: acc, nickname: nick, pwd: pwd, recovery_code: rec }]).select().single();
                    if(error) throw error;
                    alert("注册成功！即将自动登入...");
                    const userObj = { id: data.id, account_name: data.account_name, nickname: data.nickname };
                    localStorage.setItem('yaoai_user', JSON.stringify(userObj));
                    authModal.classList.add('hidden'); initApp(userObj);
                } catch(e) { alert(e.message); } finally { hideAuthLoading(); }
            });

            // 找回/修改密码
            document.getElementById('submitRec').addEventListener('click', async () => {
                if(!supabaseClient) return alert("数据库尚未连接");
                const acc = document.getElementById('rec_account').value.trim(); const key = document.getElementById('rec_key').value; const newPwd = document.getElementById('rec_new_pwd').value;
                if(!acc || !key || !newPwd) return alert("请填写完整信息");
                showAuthLoading('验证安全口令中...');
                try {
                    const { data, error } = await supabaseClient.from('app_users').select('*').eq('account_name', acc).single();
                    if(error || !data) throw new Error("未找到该账户");
                    if(data.recovery_code !== key && data.pwd !== key) throw new Error("找回码或旧密码错误");
                    const { error: updError } = await supabaseClient.from('app_users').update({ pwd: newPwd }).eq('id', data.id);
                    if(updError) throw updError;
                    alert("密码修改成功！请使用新密码重新登录。");
                    document.getElementById('login_account').value = acc; document.querySelector('.auth-tab[data-target="loginPanel"]').click();
                    if(currentUser && currentUser.account_name === acc) { localStorage.removeItem('yaoai_user'); initApp(null); }
                } catch(e) { alert(e.message); } finally { hideAuthLoading(); }
            });

            function resetTabs() {
                document.getElementById('tabFavorites').className = "cursor-pointer font-tactical text-2xl text-gray-500 hover:text-[#ffc107] uppercase tracking-widest flex items-center gap-2 border-b-2 border-transparent pb-1 transition-all";

                favWrapper.classList.add('hidden'); 
                mySharesContainer.classList.add('hidden'); 
                adminContainer.classList.add('hidden'); 
                publicHallContainer.classList.add('hidden');
            }

                publicHallContainer.classList.remove('hidden'); 
                renderGroups();

                adminContainer.classList.remove('hidden'); adminContainer.classList.add('flex');
                renderAdminPanel();

            function renderGroups() {
                if (!currentUser) {
                    groupsContainer.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-16 bg-[#161b22] border border-white/10 border-dashed rounded-lg shadow-inner mt-4">
                            <i class="fa-solid fa-cloud-bolt text-[#ffc107] text-5xl mb-4 drop-shadow-[0_0_15px_rgba(255,193,7,0.5)]"></i>
                            <h2 class="text-white font-tactical text-2xl tracking-widest mb-2">云端收藏夹未开启</h2>
                            <p class="text-gray-500 text-sm mb-6">所有的专属指令都将加密存储于你的云端账号数据库中。</p>
                            <button onclick="document.getElementById('authModal').classList.remove('hidden')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-8 rounded shadow-[0_0_15px_rgba(59,130,246,0.3)] transition-colors">立即登录</button>
                        </div>
                    `;
                    document.getElementById('favActionButtons').classList.add('hidden');
                    document.getElementById('favSearchContainer').classList.add('hidden');
                    return;
                }
                
                document.getElementById('favActionButtons').classList.remove('hidden');
                document.getElementById('favSearchContainer').classList.remove('hidden');
                
                if (favoriteGroups.length === 0) return;
                if (activeGroupIndex >= favoriteGroups.length) activeGroupIndex = 0;
                
                const tabsHtml = favoriteGroups.map((g, i) => {
                    const isActive = (i === activeGroupIndex);

                    return `
                        <div class="fav-tab ${isActive ? 'active-tab bg-[#161b22] border-t-2 border-t-[#ffc107] border-x border-white/10 text-[#ffc107] rounded-t-lg -mb-[1px] z-10' : 'border border-transparent border-b-white/10 text-gray-400 hover:bg-white/5'} 
                             flex items-center gap-2 px-4 py-2.5 cursor-pointer font-tactical text-lg relative" data-index="${i}">
                            <i class="fa-solid ${isActive ? 'fa-folder-open' : 'fa-folder'}"></i>
                            ${isActive ? `
                                <input type="text" value="${escapeHTML(g.name)}" readonly class="group-name-input bg-transparent outline-none w-24 pointer-events-auto transition-colors" maxlength="20">
                                <button class="rename-btn text-gray-500 hover:text-white pointer-events-auto"><i class="fa-solid fa-pen text-xs"></i></button>
                                ${delBtn}
                            ` : `<span>${escapeHTML(g.name)}</span><span class="text-xs text-gray-500 ml-1">${g.items.length}</span>`}
                        </div>
                    `;
                }).join('');

                const activeG = favoriteGroups[activeGroupIndex];
                let items = activeG.items.filter(i => 
                    (i.name||'').toLowerCase().includes(favSearchQuery) || 
                    (i.id && i.id.includes(favSearchQuery.replace('#',''))) ||
                    (i.text||'').toLowerCase().includes(favSearchQuery)
                );
                const totalPages = Math.ceil(items.length / ITEMS_PER_PAGE) || 1;
                if (currentPageFav > totalPages) currentPageFav = totalPages;
                const slice = items.slice((currentPageFav - 1) * ITEMS_PER_PAGE, currentPageFav * ITEMS_PER_PAGE);

                groupsContainer.innerHTML = `
                    <div class="flex items-end overflow-x-auto hide-scrollbar border-b border-white/10">${tabsHtml}</div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-5 min-h-[160px] p-5 drag-zone bg-[#161b22] border border-white/10 rounded-b-lg relative" data-group-id="${activeG.id}">
                        ${slice.length === 0 ? `<div class="empty-placeholder">DRAG & DROP TO [ ${escapeHTML(activeG.name)} ]</div>` : ''}
                        ${slice.map(item => createLocalItemHTML(item)).join('')}
                        ${totalPages > 1 ? `<div class="col-span-full flex justify-center gap-4 mt-4 pagination-controls">
                            <button class="prev-page-fav text-gray-400 disabled:opacity-20 transition-colors hover:text-white" ${currentPageFav === 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-left"></i></button>
                            <span class="font-tactical tracking-widest text-sm text-gray-500 mt-1">PAGE ${currentPageFav}/${totalPages}</span>
                            <button class="next-page-fav text-gray-400 disabled:opacity-20 transition-colors hover:text-white" ${currentPageFav === totalPages ? 'disabled' : ''}><i class="fa-solid fa-chevron-right"></i></button>
                        </div>` : ''}
                    </div>
                `;
                initDraggable();
            }

            function createLocalItemHTML(item) {
                const hasId = item.id && item.id !== '';
                let displayItem = item;
                if (hasId) { const cloudItem = sharedItems.find(i => i.id === item.id); if (cloudItem) displayItem = { ...item, ...cloudItem }; }

                if (hasId) {
                    return `
                        <div class="prompt-item group hover:border-[#ffc107] relative is-fav" data-uid="${item._uid}" data-id="${item.id}" data-name="${escapeHTML(displayItem.name || '')}" data-text="${escapeHTML(displayItem.text || '')}">
                            <div class="id-badge flex items-center">
                                <span>#${item.id}</span>
                                <span class="text-[10px] text-purple-300 ml-1.5 opacity-90 border-l border-cyan-500/30 pl-1.5 truncate max-w-[65px]" title="发布者: ${escapeHTML(displayItem.authorName || '未知')}"><i class="fa-solid fa-user text-[8px] mr-0.5"></i>${escapeHTML(displayItem.authorName || '未知')}</span>
                            </div>
                            <div class="prompt-content" title="${escapeHTML(displayItem.name || '')}">${escapeHTML((displayItem.name||'').length > 21 ? displayItem.name.substring(0,21) + '…' : displayItem.name || '')}</div>
                            <div class="fav-action"><i class="fa-solid fa-star"></i><span class="fav-count-text">${formatCount(displayItem.favs)}</span></div>
                            <div class="absolute bottom-1 left-2 text-[10px] text-gray-500 font-tactical pointer-events-none tracking-widest">USE: <span class="usage-count-text">${formatCount(displayItem.usage)}</span></div>
                            <div class="absolute top-1.5 right-[75px] flex gap-1 opacity-0 group-hover:opacity-100 transition-all z-10">
                                <button class="copy-shared-btn text-gray-400 hover:text-green-400 bg-black/60 hover:bg-black p-1.5 rounded transition-colors" title="复制指令内容"><i class="fa-solid fa-copy pointer-events-none text-xs w-3 text-center"></i></button>
                                <button class="delete-item-btn text-gray-400 hover:text-red-500 bg-black/60 hover:bg-black p-1.5 rounded transition-colors" title="无感移除该词条"><i class="fa-solid fa-trash-can pointer-events-none text-xs w-3 text-center"></i></button>
                            </div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="prompt-item group hover:border-[#ffc107] relative" data-uid="${item._uid}" data-id="" data-name="${escapeHTML(item.name || '')}" data-text="${escapeHTML(item.text || '')}">
                            <div class="prompt-content" title="${escapeHTML(item.name || '')}">${escapeHTML((item.name||'').length > 21 ? item.name.substring(0,21) + '…' : item.name || '')}</div>
                            <div class="absolute top-1.5 right-[10px] flex gap-1 opacity-0 group-hover:opacity-100 transition-all z-10">
                                <button class="publish-item-btn text-gray-400 hover:text-blue-400 bg-black/60 hover:bg-black p-1.5 rounded transition-colors" title="一键发布到全网大厅"><i class="fa-solid fa-cloud-arrow-up pointer-events-none text-xs w-3 text-center"></i></button>
                                <button class="copy-item-btn text-gray-400 hover:text-green-400 bg-black/60 hover:bg-black p-1.5 rounded transition-colors" title="复制指令内容"><i class="fa-solid fa-copy pointer-events-none text-xs w-3 text-center"></i></button>
                                <button class="edit-item-btn text-gray-400 hover:text-[#ffc107] bg-black/60 hover:bg-black p-1.5 rounded transition-colors" title="修改名称"><i class="fa-solid fa-pen pointer-events-none text-xs w-3 text-center"></i></button>
                                <button class="delete-item-btn text-gray-400 hover:text-red-500 bg-black/60 hover:bg-black p-1.5 rounded transition-colors" title="无感删除词条"><i class="fa-solid fa-trash-can pointer-events-none text-xs w-3 text-center"></i></button>
                            </div>
                        </div>
                    `;
                }
            }

            function initDraggable() {
                if (typeof Sortable === 'undefined') return;
                const zone = document.querySelector('.drag-zone');
                if (!zone) return;
                new Sortable(zone, {
                    group: 'favorites', 
                    animation: 150, 
                    delay: 50, 
                    delayOnTouchOnly: false, 
                    ghostClass: 'sortable-ghost',
                    filter: '.empty-placeholder, .pagination-controls, .delete-item-btn, .edit-item-btn, .copy-item-btn, .publish-item-btn',
                    onStart: (e) => { globalDraggedItem = e.item; },
                    onEnd: () => { globalDraggedItem = null; },
                    onAdd: function(evt) {
                        const itemEl = evt.item;
                        const itemData = { _uid: 'uid_' + Math.random().toString(36).substr(2, 9), id: itemEl.dataset.id || '', name: itemEl.dataset.name, text: itemEl.dataset.text };
                        const targetG = favoriteGroups[activeGroupIndex];
                        const isDuplicate = targetG.items.some(i => 
                            (itemData.id && i.id === itemData.id) || 
                            (!itemData.id && i.text === itemData.text)
                        );
                        setTimeout(() => {
                            itemEl.remove(); 
                            if (!isDuplicate) { 
                                targetG.items.splice(evt.newIndex, 0, itemData); 
                                // 【新挂载】拖拽添加如果来自于大厅，同样 +1 云端收藏
                                if (itemData.id && supabaseClient) {
                                    const dbItem = sharedItems.find(i => i.id === itemData.id);
                                    if (dbItem) {
                                        dbItem.favs = (parseInt(dbItem.favs || 0) + 1).toString();
                                        supabaseClient.from('shared_prompts').update({ favs: dbItem.favs }).eq('id', itemData.id).then();
                                    }
                                }
                                saveCloudAndSync(true); 
                                if (!sharedGrid.classList.contains('hidden')) renderSharedGrid();
                            } else { renderGroups(); }
                        }, 10);
                    },
                    onUpdate: () => {
                        const domItems = Array.from(zone.querySelectorAll('.prompt-item:not(.sortable-ghost)'));
                        const newData = domItems.map(el => ({ _uid: el.dataset.uid, id: el.dataset.id, name: el.dataset.name, text: el.dataset.text }));
                        const start = (currentPageFav - 1) * ITEMS_PER_PAGE;
                        favoriteGroups[activeGroupIndex].items.splice(start, newData.length, ...newData);
                        saveCloudAndSync(false);
                    }
                });
            }

            function renderSharedGrid() {
                const sortBy = document.getElementById('sortSelector')?.value || 'time';
                let items = [...sharedItems].filter(i => (i.name||'').toLowerCase().includes(sharedSearchQuery) || (i.id && i.id.includes(sharedSearchQuery.replace('#',''))));
                
                // 【新增】拦截未审核的词条，且兼容旧数据 (null 视为已审核)
                items = items.filter(i => i.is_approved !== false); 
                
                items.sort((a,b) => {
                    if (a.is_pinned && !b.is_pinned) return -1;
                    if (!a.is_pinned && b.is_pinned) return 1;
                    if(sortBy === 'favs') return parseInt(b.favs||0) - parseInt(a.favs||0);
                    if(sortBy === 'usage') return parseInt(b.usage||0) - parseInt(a.usage||0);
                    return parseInt(b.time||0) - parseInt(a.time||0);
                });
                
                const totalPages = Math.ceil(items.length / ITEMS_PER_PAGE) || 1;
                if (currentPageShared > totalPages) currentPageShared = totalPages;
                const slice = items.slice((currentPageShared - 1) * ITEMS_PER_PAGE, currentPageShared * ITEMS_PER_PAGE);
                
                sharedGrid.innerHTML = slice.map(i => `
                    <div class="prompt-item group relative" data-id="${i.id}" data-name="${escapeHTML(i.name)}" data-text="${escapeHTML(i.text)}" data-favs="${i.favs}">
                        ${i.is_pinned ? `<div class="absolute top-1 right-2 text-yellow-400 text-xs z-0" title="全网置顶"><i class="fa-solid fa-thumbtack"></i></div>` : ''}
                        <div class="id-badge flex items-center">
                            <span>#${i.id}</span>
                            <span class="text-[10px] text-purple-300 ml-1.5 opacity-90 border-l border-cyan-500/30 pl-1.5 truncate max-w-[65px]" title="发布者: ${escapeHTML(i.authorName || '未知用户')}"><i class="fa-solid fa-user text-[8px] mr-0.5"></i>${escapeHTML(i.authorName || '未知用户')}</span>
                        </div>
                        <div class="prompt-content" title="${escapeHTML(i.name)}">${escapeHTML((i.name||'').length > 21 ? i.name.substring(0,21) + '…' : i.name)}</div>
                        <div class="fav-action"><i class="fa-solid fa-star"></i><span class="fav-count-text">${formatCount(i.favs)}</span></div>
                        <div class="absolute bottom-1 left-2 text-[10px] text-gray-500 font-tactical pointer-events-none tracking-widest">USE: <span class="usage-count-text">${formatCount(i.usage)}</span></div>
                        <div class="absolute top-1.5 right-[75px] flex gap-1 opacity-60 group-hover:opacity-100 transition-all z-10">
                            <button class="copy-shared-btn text-gray-400 hover:text-green-400 bg-black/60 hover:bg-black p-1.5 rounded transition-colors" title="复制并增加使用量"><i class="fa-solid fa-copy pointer-events-none text-xs w-3 text-center"></i></button>
                        </div>
                    </div>
                `).join('');
                
                if (totalPages > 1) {
                    sharedGrid.insertAdjacentHTML('beforeend', `
                        <div class="col-span-full flex justify-center items-center gap-4 mt-2">
                            <button class="prev-page-shared px-3 py-1 bg-white/5 hover:bg-white/10 rounded text-gray-400 disabled:opacity-30 transition-colors hover:text-white" ${currentPageShared === 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-left"></i></button>
                            <span class="font-tactical text-gray-500 tracking-widest text-sm">PAGE ${currentPageShared} / ${totalPages}</span>
                            <button class="next-page-shared px-3 py-1 bg-white/5 hover:bg-white/10 rounded text-gray-400 disabled:opacity-30 transition-colors hover:text-white" ${currentPageShared === totalPages ? 'disabled' : ''}><i class="fa-solid fa-chevron-right"></i></button>
                        </div>
                    `);
                }
                
                if (typeof Sortable !== 'undefined') {
                    new Sortable(sharedGrid, { 
                        group: { name:'favorites', pull:'clone', put:false }, 
                        sort:false, 
                        delay: 50,
                        delayOnTouchOnly: false,
                        filter: '.prev-page-shared, .next-page-shared, .copy-shared-btn',
                        onStart:(e) => { globalDraggedItem = e.item; }, 
                        onEnd:() => { globalDraggedItem = null; } 
                    });
                }
                updateSharedUI();
            }

                    </div>
                `).join('');
            }

            function renderAdminPanel() {
                if (!isAdminLoggedIn) return;
                let items = [...sharedItems];
                if (adminSearchQuery) items = items.filter(i => (i.name||'').toLowerCase().includes(adminSearchQuery) || (i.id && i.id.includes(adminSearchQuery.replace('#',''))) || (i.text||'').toLowerCase().includes(adminSearchQuery));

                const sortBy = document.getElementById('adminSortSelector')?.value || 'time';
                items.sort((a,b) => {
                    if (sortBy === 'pinned') {
                        if (a.is_pinned !== b.is_pinned) return a.is_pinned ? -1 : 1;
                        return parseInt(b.time||0) - parseInt(a.time||0);
                    }
                    if(sortBy === 'favs') return parseInt(b.favs||0) - parseInt(a.favs||0);
                    if(sortBy === 'usage') return parseInt(b.usage||0) - parseInt(a.usage||0);
                    return parseInt(b.time||0) - parseInt(a.time||0);
                });

                        <span class="font-tactical text-gray-500 tracking-widest text-sm mt-1">PAGE ${currentPageAdmin}/${totalPages}</span>
                        <button class="next-page-admin px-3 py-1 bg-white/5 hover:bg-white/10 rounded text-gray-400 disabled:opacity-20 transition-colors hover:text-white" ${currentPageAdmin === totalPages ? 'disabled' : ''}><i class="fa-solid fa-chevron-right"></i></button>
                    `;
