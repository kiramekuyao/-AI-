            function updateSharedUI() {
                const allFavIds = favoriteGroups.flatMap(g => g.items).filter(i => i.id).map(i => i.id);
                const allFavText = favoriteGroups.flatMap(g => g.items).filter(i => !i.id).map(i => i.text); 
                
                document.querySelectorAll('.prompt-item').forEach(el => {
                    const isSaved = (el.dataset.id && allFavIds.includes(el.dataset.id)) || (!el.dataset.id && allFavText.includes(el.dataset.text));
                    el.classList.toggle('is-fav', isSaved);
                    
                    const counter = el.querySelector('.fav-count-text');
                    if(counter && el.dataset.id) {
                        const dbItem = sharedItems.find(i => i.id === el.dataset.id);
                        if (dbItem) counter.textContent = formatCount(dbItem.favs || 0);
                    }
                });
            }
            
            function closeEditModal() { editModal.classList.add('hidden'); currentEditItemId = null; }
            document.getElementById('closeEditModalBtn').onclick = closeEditModal;
            document.getElementById('cancelEditBtn').onclick = closeEditModal;

            document.body.addEventListener('drop', (e) => {
                const tab = e.target.closest('.fav-tab');
                if (tab && globalDraggedItem) {
                    const idx = parseInt(tab.dataset.index);
                    const itemData = { _uid: 'uid_' + Math.random().toString(36).substr(2, 9), id: globalDraggedItem.dataset.id||'', name: globalDraggedItem.dataset.name, text: globalDraggedItem.dataset.text };
                    const isDuplicate = favoriteGroups[idx].items.some(i => (itemData.id && i.id === itemData.id));
                    if (!isDuplicate) { 
                        favoriteGroups[idx].items.unshift(itemData); 
                        // 【新挂载】拖拽添加如果来自于大厅，同样 +1 云端收藏
                        if (itemData.id && supabaseClient) {
                            const dbItem = sharedItems.find(i => i.id === itemData.id);
                            if (dbItem) {
                                dbItem.favs = (parseInt(dbItem.favs || 0) + 1).toString();
                                supabaseClient.from('shared_prompts').update({ favs: dbItem.favs }).eq('id', itemData.id).then();
                            }
                        }
                        activeGroupIndex = idx; currentPageFav = 1; saveCloudAndSync(); 
                    }
                }
                document.querySelectorAll('.fav-tab').forEach(t => t.classList.remove('tab-drop-target'));
            });
            
            document.body.addEventListener('dragover', (e) => {
                if (!globalDraggedItem) return;
                const tab = e.target.closest('.fav-tab');
                if (tab) {
                    e.preventDefault(); tab.classList.add('tab-drop-target');
                    clearTimeout(hoverExpandTimer);
                    hoverExpandTimer = setTimeout(() => { activeGroupIndex = parseInt(tab.dataset.index); currentPageFav = 1; renderGroups(); }, 500);
                }
            });
            document.body.addEventListener('dragleave', (e) => {
                const tab = e.target.closest('.fav-tab');
                if (tab) { tab.classList.remove('tab-drop-target'); clearTimeout(hoverExpandTimer); }
            });

            document.body.addEventListener('click', (e) => {
                const t = e.target;
                
                const adminCard = t.closest('.admin-card');
                if (adminCard && !t.closest('input') && !t.closest('button') && !t.closest('.pin-admin-btn') && !t.closest('.myshare-cb') && !t.closest('.admin-cb') && !t.closest('.approve-admin-btn')) {
                    const id = adminCard.dataset.id; const item = sharedItems.find(i => i.id === id);
                    if (item) {
                        currentEditItemId = id; editModalId.textContent = `#${id}`; editModalName.value = item.name || ''; editModalText.value = item.text || ''; editModal.classList.remove('hidden');
                    } return;
                }
                
                if (t.id === 'saveEditBtn') {
                    if (!currentEditItemId || !supabaseClient) return;
                    const newName = editModalName.value.trim(); const newText = editModalText.value.trim();
                    if (!newName || !newText) { alert("名称和内容不能为空！"); return; }
                    
                    const originalBtnContent = saveEditBtn.innerHTML;
                    saveEditBtn.disabled = true; saveEditBtn.innerHTML = `<i class="fa-solid fa-arrows-rotate fa-spin"></i> 同步更新中...`;

                    supabaseClient.from('shared_prompts').update({ name: newName, text: newText }).eq('id', currentEditItemId).then(({error}) => {
                        saveEditBtn.disabled = false; saveEditBtn.innerHTML = originalBtnContent;
                        if (error) alert('更新失败: ' + error.message); else { closeEditModal(); fetchCloudData(); }
                    }); return;
                }

                if (t.closest('#exportJsonBtn')) {
                    const activeGroup = favoriteGroups[activeGroupIndex];
                    if (!activeGroup || !activeGroup.items || activeGroup.items.length === 0) { alert('当前标签组为空，没有数据可导出！'); return; }
                    const exportData = [{ name: activeGroup.name, items: activeGroup.items.map(i => ({ name: i.name, text: i.text })) }];
                    const dataStr = JSON.stringify(exportData, null, 2); const blob = new Blob([dataStr], { type: 'application/json' }); const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = `YaoAI_${activeGroup.name}_${new Date().getTime()}.json`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); return;
                }

                if (t.closest('#importJsonBtn')) {
                    const input = document.createElement('input'); input.type = 'file'; input.accept = '.json, .txt';
                    input.onchange = ev => {
                        const file = ev.target.files[0]; if (!file) return; const isTxt = file.name.endsWith('.txt'); const reader = new FileReader();
                        reader.onload = event => {
                            const fileContent = event.target.result;
                            if (isTxt) {
                                const blocks = fileContent.split(/------------------------------------------------------------/); const items = [];
                                blocks.forEach(block => {
                                    const match = block.match(/##\s*\d+\.\s*([^\n]+)\r?\n([\s\S]+)/);
                                    if (match) items.push({ _uid: 'uid_' + Math.random().toString(36).substr(2, 9), id: '', name: match[1].trim().substring(0, 20), text: match[2].trim() });
                                });
                                if (items.length > 0) {
                                    const groupName = (file.name.replace('.txt', '') + ' (导入)').substring(0, 20);
                                    favoriteGroups.push({ id: 'group_' + Date.now() + Math.floor(Math.random()*1000), name: groupName, items: items });
                                    activeGroupIndex = favoriteGroups.length - 1; currentPageFav = 1; saveCloudAndSync(true); alert(`✅ 成功从 TXT 导入了 ${items.length} 个魔导书词条！`);
                                } else alert('TXT解析失败：未在文件中找到符合格式的提示词。');
                            } else {
                                try {
                                    const data = JSON.parse(fileContent); let importedGroups = Array.isArray(data) ? data : [data]; let importedCount = 0;
                                    importedGroups.forEach(g => {
                                        const groupItems = g.items || g.keywords;
                                        if (g.name && Array.isArray(groupItems)) {
                                            favoriteGroups.push({
                                                id: 'group_' + Date.now() + Math.floor(Math.random()*1000), name: (g.name + ' (导入)').substring(0, 20),
                                                items: groupItems.map(i => ({ _uid: 'uid_' + Math.random().toString(36).substr(2, 9), id: i.id || '', name: (i.name || i.label || '未命名').substring(0,20), text: i.text || i.value || '' }))
                                            }); importedCount++;
                                        }
                                    });
                                    if (importedCount > 0) { activeGroupIndex = favoriteGroups.length - 1; currentPageFav = 1; saveCloudAndSync(true); alert(`✅ 成功导入了 ${importedCount} 个标签组！`); }
                                } catch (err) { alert("JSON 读取失败: " + err.message); }
                            }
                        };
                        reader.readAsText(file);
                    }; input.click(); return;
                }

                if (t.closest('.publish-item-btn')) {
                    e.stopPropagation();
                    if(!supabaseClient) { alert("云端服务未连接"); return; }
                    if (!currentUser) { alert('请先登录账号才能发布共享！'); authModal.classList.remove('hidden'); return; }

                    const itemEl = t.closest('.prompt-item'); const text = itemEl.dataset.text; const name = itemEl.dataset.name; if (!text) return;
                    const newId = String(Math.floor(1000+Math.random()*9000)); const userName = currentUser.nickname || '未知用户';
                    
                    syncStatusEl.innerHTML = `<i class="fa-solid fa-arrows-rotate fa-spin text-blue-400"></i> <span class="text-blue-400">发布中...</span>`;
                    supabaseClient.from('shared_prompts').insert([{ id: newId, name: name, text: text, favs: "0", usage: "0", time: Date.now().toString(), authorId: currentUser.id, authorName: userName, is_pinned: false, is_approved: isAdminLoggedIn }]).then(({error}) => {
                        if (error) {
                            alert('发布失败:' + error.message); syncStatusEl.innerHTML = `<i class="fa-solid fa-cloud text-blue-400"></i> <span class="text-blue-400">云端已连接</span>`;
                        } else { 
                            syncStatusEl.innerHTML = `<i class="fa-solid fa-check text-green-400"></i> <span class="text-green-400">云端发布成功</span>`;
                            setTimeout(() => { syncStatusEl.innerHTML = `<i class="fa-solid fa-cloud text-blue-400"></i> <span class="text-blue-400">已登录</span>`; }, 3000);
                            const btn = t.closest('.publish-item-btn'); const icon = btn.querySelector('i');
                            icon.className = 'fa-solid fa-check text-green-400 pointer-events-none text-xs w-3 text-center'; setTimeout(() => icon.className = 'fa-solid fa-cloud-arrow-up pointer-events-none text-xs w-3 text-center', 1500);
                            document.getElementById('sortSelector').value = 'time'; currentPageShared = 1; fetchCloudData(); 
                        }
                    }); return;
                }

                if (t.closest('.copy-item-btn') || t.closest('.copy-shared-btn')) {
                    e.stopPropagation();
                    const btn = t.closest('button'); const item = t.closest('.prompt-item'); const text = item.dataset.text;
                    navigator.clipboard.writeText(text);
                    const icon = btn.querySelector('i'); icon.className = 'fa-solid fa-check text-green-400 pointer-events-none text-xs w-3 text-center'; setTimeout(() => icon.className = 'fa-solid fa-copy pointer-events-none text-xs w-3 text-center', 1500);

                    if (t.closest('.copy-shared-btn') && supabaseClient) {
                        const id = item.dataset.id; const dbItem = sharedItems.find(i => i.id === id);
                        if (dbItem) {
                            dbItem.usage = (parseInt(dbItem.usage || 0) + 1).toString();
                            const uEl = item.querySelector('.usage-count-text'); if (uEl) uEl.textContent = formatCount(dbItem.usage);
                            supabaseClient.from('shared_prompts').update({ usage: dbItem.usage }).eq('id', id).then();
                        }
                    } return;
                }

                if (t.closest('#saveTerminalBtn')) {
                    if(!currentUser) { alert('云端环境强制：请先登录账号'); authModal.classList.remove('hidden'); return; }
                    const text = promptArea.value.trim(); if (!text) { alert('终端目前为空！'); return; }
                    let name = prompt('命名此指令 (最长20字符)：', '自定义指令'); if (!name) return; if (name.length > 20) { alert('名称过长，请精简至20字符内。'); return; }
                    const defIdx = favoriteGroups.findIndex(g => g.id === 'group_default');
                    favoriteGroups[defIdx].items.unshift({ _uid: 'uid_' + Math.random().toString(36).substr(2, 9), id: '', name: name, text: text });
                    activeGroupIndex = defIdx; currentPageFav = 1; saveCloudAndSync(); return;
                }

                if (t.closest('#shareTerminalBtn')) {
                    if(!supabaseClient) { alert("云端服务未连接"); return; }
                    if (!currentUser) { alert('请先登录'); authModal.classList.remove('hidden'); return; }
                    const text = promptArea.value.trim(); if (!text) return;
                    const name = prompt('为共享起个名字 (最长20字符)：'); if (!name) return; if (name.length > 20) { alert('名称过长，请精简至20字符内。'); return; }
                    const newId = String(Math.floor(1000+Math.random()*9000)); const userName = currentUser.nickname || '未知用户';
                    syncStatusEl.innerHTML = `<i class="fa-solid fa-arrows-rotate fa-spin text-blue-400"></i> <span class="text-blue-400">发布中...</span>`;
                    supabaseClient.from('shared_prompts').insert([{ id: newId, name: name, text: text, favs: "0", usage: "0", time: Date.now().toString(), authorId: currentUser.id, authorName: userName, is_pinned: false, is_approved: isAdminLoggedIn }]).then(({error}) => {
                        if (error) { alert('发布失败:' + error.message); syncStatusEl.innerHTML = `<i class="fa-solid fa-cloud text-blue-400"></i> <span class="text-blue-400">云端已连接</span>`; } 
                        else { 
                            syncStatusEl.innerHTML = `<i class="fa-solid fa-check text-green-400"></i> <span class="text-green-400">共享成功</span>`;
                            setTimeout(() => { syncStatusEl.innerHTML = `<i class="fa-solid fa-cloud text-blue-400"></i> <span class="text-blue-400">已登录</span>`; }, 3000);
                            document.getElementById('sortSelector').value = 'time'; currentPageShared=1; fetchCloudData(); 
                        }
                    }); return;
                }
                
                if (t.closest('#clearBtn')) { promptArea.value = ''; document.getElementById('charCount').textContent = "剩余 50000 字"; return; }
                if (t.closest('#copyBtn')) { navigator.clipboard.writeText(promptArea.value); const b = t.closest('#copyBtn'); b.textContent = 'COPIED'; setTimeout(() => b.textContent = '复制指令', 1500); return; }
                if (t.closest('#backBtn')) { if(history.length) { promptArea.value = history.pop(); document.getElementById('charCount').textContent = `剩余 ${50000 - promptArea.value.length} 字`; } return; }
                if (t.closest('#refreshSharedBtn')) { fetchCloudData(); return; }
                if (t.closest('#addGroupBtn')) { favoriteGroups.push({ id: 'group_'+Date.now(), name: '新标签', items: [] }); activeGroupIndex = favoriteGroups.length - 1; saveCloudAndSync(); return; }
                if (t.closest('.fav-tab') && !t.closest('.delete-group-btn') && !t.closest('.rename-btn')) { activeGroupIndex = parseInt(t.closest('.fav-tab').dataset.index); currentPageFav = 1; renderGroups(); return; }
                if (t.closest('.delete-group-btn')) {
                    const idx = parseInt(t.closest('.fav-tab').dataset.index);
                    if (favoriteGroups[idx].id === 'group_default') return;
                    if (confirm('彻底删除此标签及词条？')) {
                        // 【修复】删除收藏夹时，同步减少组内所有云端词汇的 favs 计数
                        const groupToDelete = favoriteGroups[idx];
                        if (supabaseClient && groupToDelete.items && groupToDelete.items.length > 0) {
                            groupToDelete.items.forEach(item => {
                                if (item.id) {
                                    const dbItem = sharedItems.find(si => si.id === item.id);
                                    if (dbItem && parseInt(dbItem.favs || 0) > 0) {
                                        dbItem.favs = (parseInt(dbItem.favs) - 1).toString();
                                        supabaseClient.from('shared_prompts').update({ favs: dbItem.favs }).eq('id', item.id).then();
                                    }
                                }
                            });
                        }
                        favoriteGroups.splice(idx, 1);
                        // 【修复】删除后修正 activeGroupIndex，防止越界或指向错误标签
                        if (activeGroupIndex >= favoriteGroups.length) {
                            activeGroupIndex = favoriteGroups.length - 1;
                        } else if (idx < activeGroupIndex) {
                            activeGroupIndex--;
                        }
                        if (activeGroupIndex < 0) activeGroupIndex = 0;
                        currentPageFav = 1;
                        saveCloudAndSync();
                        if (!sharedGrid.classList.contains('hidden')) renderSharedGrid();
                    }
                    return;
                }
                if (t.closest('.rename-btn')) { const inp = t.closest('.fav-tab').querySelector('.group-name-input'); if(inp) { inp.readOnly = false; inp.focus(); } return; }
                if (t.closest('.prev-page-fav')) { currentPageFav--; renderGroups(); return; }
                if (t.closest('.next-page-fav')) { currentPageFav++; renderGroups(); return; }
                if (t.closest('.prev-page-shared')) { currentPageShared--; renderSharedGrid(); return; }
                if (t.closest('.next-page-shared')) { currentPageShared++; renderSharedGrid(); return; }
                if (t.closest('.prev-page-myshares')) { currentPageMyShares--; renderMyShares(); return; }
                if (t.closest('.next-page-myshares')) { currentPageMyShares++; renderMyShares(); return; }
                if (t.closest('.prev-page-admin')) { currentPageAdmin--; renderAdminPanel(); return; }
                if (t.closest('.next-page-admin')) { currentPageAdmin++; renderAdminPanel(); return; }
                if (t.closest('#mySelectAllBtn')) { document.querySelectorAll('.myshare-cb').forEach(cb => cb.checked = true); return; }
                if (t.closest('#myInverseSelectBtn')) { document.querySelectorAll('.myshare-cb').forEach(cb => cb.checked = !cb.checked); return; }
                if (t.closest('#adminSelectAllBtn')) { document.querySelectorAll('.admin-cb').forEach(cb => cb.checked = true); return; }
                if (t.closest('#adminInverseSelectBtn')) { document.querySelectorAll('.admin-cb').forEach(cb => cb.checked = !cb.checked); return; }

                // 删除本地收藏夹卡片 (同步 -1 收藏量)
                if (t.closest('.delete-item-btn')) {
                    const itemEl = t.closest('.prompt-item');
                    const uid = itemEl.dataset.uid; 
                    const id = itemEl.dataset.id;
                    favoriteGroups[activeGroupIndex].items = favoriteGroups[activeGroupIndex].items.filter(i => i._uid !== uid); 
                    
                    if (id && supabaseClient) {
                        const dbItem = sharedItems.find(i => i.id === id);
                        if (dbItem && parseInt(dbItem.favs || 0) > 0) {
                            dbItem.favs = (parseInt(dbItem.favs) - 1).toString();
                            supabaseClient.from('shared_prompts').update({ favs: dbItem.favs }).eq('id', id).then();
                        }
                    }
                    saveCloudAndSync(); 
                    if (!sharedGrid.classList.contains('hidden')) renderSharedGrid();
                    return;
                }

                // 【新增】管理员审核通过
                if (t.closest('.approve-admin-btn')) {
                    if (!supabaseClient) return; 
                    const tr = t.closest('.admin-card'); 
                    const id = tr.dataset.id; 
                    const btn = t.closest('.approve-admin-btn');
                    const originalIcon = btn.innerHTML;
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-[10px]"></i>';
                    
                    supabaseClient.from('shared_prompts').update({ is_approved: true }).eq('id', id).then(({error}) => { 
                        if(!error) fetchCloudData(); 
                        else {
                            alert('审核失败: ' + error.message);
                            btn.innerHTML = originalIcon;
                        }
                    }); 
                    return;
                }

                if (t.closest('.pin-admin-btn')) {
                    if (!supabaseClient) return; const tr = t.closest('.admin-card'); const id = tr.dataset.id; const item = sharedItems.find(i => i.id === id);
                    if (item) {
                        const newPinState = !item.is_pinned; 
                        supabaseClient.from('shared_prompts').update({ is_pinned: newPinState }).eq('id', id).then(({error}) => { if(!error) fetchCloudData(); });
                    } return;
                }
                
                if (t.closest('#addSubAdminBtn') && supabaseClient) {
                    const acc = document.getElementById('newSubAdminAccount').value.trim(); if (!acc || acc === ROOT_ADMIN || subAdmins.includes(acc)) return;
                    supabaseClient.from('admin_whitelist').insert([{ account_name: acc }]).then(({error}) => {
                        if(!error) { subAdmins.push(acc); document.getElementById('newSubAdminAccount').value = ''; renderSubAdmins(); alert('管理员添加成功'); } else { alert('添加失败: ' + error.message); }
                    }); return;
                }
                
                if (t.closest('.delete-subadmin-btn') && supabaseClient) {
                    const acc = t.closest('.delete-subadmin-btn').dataset.account;
                    if(confirm(`确定要移除管理员身份: ${acc}?`)) {
                        supabaseClient.from('admin_whitelist').delete().eq('account_name', acc).then(({error}) => { if(!error) { subAdmins = subAdmins.filter(e => e !== acc); renderSubAdmins(); } });
                    } return;
                }

                if (t.closest('#adminBatchDelete') && supabaseClient) {
                    const cbs = document.querySelectorAll('.admin-cb:checked'); if(cbs.length === 0) return;
                    const ids = Array.from(cbs).map(cb => cb.closest('.admin-card').dataset.id);
                    if(confirm(`删除 ${ids.length} 个词汇？`)) {
                        supabaseClient.from('shared_prompts').delete().in('id', ids).then(() => {
                            // 【修复】同步从所有本地收藏夹中移除已删除的云端词汇
                            const idSet = new Set(ids);
                            let changed = false;
                            favoriteGroups.forEach(g => {
                                const before = g.items.length;
                                g.items = g.items.filter(i => !i.id || !idSet.has(i.id));
                                if (g.items.length !== before) changed = true;
                            });
                            if (changed) saveCloudAndSync(true);
                            fetchCloudData();
                        });
                    }
                    return;
                }
                
                if (t.closest('#myBatchDelete') && supabaseClient) {
                    const cbs = document.querySelectorAll('.myshare-cb:checked'); if(cbs.length === 0) return;
                    const ids = Array.from(cbs).map(cb => cb.closest('.admin-card').dataset.id);
                    if(confirm(`确定要彻底删除选中的 ${ids.length} 个属于你的共享词汇吗？`)) {
                        supabaseClient.from('shared_prompts').delete().in('id', ids).then(() => {
                            // 【修复】同步从所有本地收藏夹中移除已删除的云端词汇
                            const idSet = new Set(ids);
                            let changed = false;
                            favoriteGroups.forEach(g => {
                                const before = g.items.length;
                                g.items = g.items.filter(i => !i.id || !idSet.has(i.id));
                                if (g.items.length !== before) changed = true;
                            });
                            if (changed) saveCloudAndSync(true);
                            fetchCloudData();
                        });
                    }
                    return;
                }

                if (t.closest('.fav-action')) {
                    if (!currentUser) { alert('此操作需要登入账号！'); authModal.classList.remove('hidden'); return; }

                    const item = t.closest('.prompt-item'); const id = item.dataset.id; const text = item.dataset.text;
                    const exists = favoriteGroups.some(g => g.items.some(i => (id && i.id === id) || (!id && i.text === text)));
                    
                    if (exists) {
                        favoriteGroups.forEach(g => g.items = g.items.filter(i => (id ? i.id !== id : i.text !== text)));
                        if (id && supabaseClient) {
                            const dbItem = sharedItems.find(i => i.id === id);
                            if (dbItem && parseInt(dbItem.favs || 0) > 0) {
                                dbItem.favs = (parseInt(dbItem.favs) - 1).toString();
                                supabaseClient.from('shared_prompts').update({ favs: dbItem.favs }).eq('id', id).then();
                            }
                        }
                    } else {
                        favoriteGroups[0].items.unshift({ _uid: 'uid_' + Math.random().toString(36).substr(2, 9), id: id||'', name: item.dataset.name, text: text });
                        if (id && supabaseClient) {
                            const dbItem = sharedItems.find(i => i.id === id);
                            if (dbItem) {
                                dbItem.favs = (parseInt(dbItem.favs || 0) + 1).toString();
                                supabaseClient.from('shared_prompts').update({ favs: dbItem.favs }).eq('id', id).then();
                            }
                        }
                    }
                    saveCloudAndSync(); 
                    if (!sharedGrid.classList.contains('hidden')) renderSharedGrid();
                    return;
                }

                if (t.closest('.edit-item-btn')) {
                    const itemEl = t.closest('.prompt-item'); const newName = prompt('修改本地名称 (最长20字符):', itemEl.dataset.name);
                    if(newName) { if (newName.length > 20) { alert('限制20字符以内'); return; } const obj = favoriteGroups[activeGroupIndex].items.find(i => i._uid === itemEl.dataset.uid); if(obj) { obj.name = newName; saveCloudAndSync(); } } return;
                }

                if (t.closest('.prompt-item') && !t.closest('.fav-action') && !t.closest('button') && !t.closest('input')) {
                    const item = t.closest('.prompt-item');
                    history.push(promptArea.value);
                    promptArea.value += (promptArea.value && !promptArea.value.endsWith('\n') ? '\n' : '') + item.dataset.text;
                    document.getElementById('charCount').textContent = `剩余 ${50000 - promptArea.value.length} 字`;

                    if (item.dataset.id && supabaseClient) {
                        const id = item.dataset.id; const dbItem = sharedItems.find(i => i.id === id);
                        if (dbItem) {
                            dbItem.usage = (parseInt(dbItem.usage || 0) + 1).toString();
                            const uEl = item.querySelector('.usage-count-text'); if (uEl) uEl.textContent = formatCount(dbItem.usage);
                            supabaseClient.from('shared_prompts').update({ usage: dbItem.usage }).eq('id', id).then();
                        }
                    }
                }
            });

            document.body.addEventListener('blur', (e) => {
                if (e.target.classList.contains('group-name-input')) {
                    e.target.readOnly = true; e.target.classList.add('bg-transparent'); e.target.classList.remove('bg-black/60', 'border-[#ffc107]');
                    favoriteGroups[activeGroupIndex].name = e.target.value.trim().substring(0, 20) || '未命名'; saveCloudAndSync(false);
                }
            }, true);
            
            // 分离绑定的各大版块搜索监听器
            const fSearch = document.getElementById('favSearchInput');
            if(fSearch) fSearch.oninput = (e) => { favSearchQuery = e.target.value.toLowerCase(); currentPageFav=1; renderGroups(); };
            
            const mSearch = document.getElementById('mySharesSearchInput');
            if(mSearch) mSearch.oninput = (e) => { mySharesSearchQuery = e.target.value.toLowerCase(); currentPageMyShares=1; renderMyShares(); };
            
            const aSearch = document.getElementById('adminSearchInput');
            if(aSearch) aSearch.oninput = (e) => { adminSearchQuery = e.target.value.toLowerCase(); currentPageAdmin=1; renderAdminPanel(); };

            const sSearch = document.getElementById('sharedSearchInput');
            if(sSearch) sSearch.oninput = (e) => { sharedSearchQuery = e.target.value.toLowerCase(); currentPageShared=1; renderSharedGrid(); };
            
            const sSort = document.getElementById('sortSelector');
            if(sSort) sSort.onchange = () => { currentPageShared=1; renderSharedGrid(); };
            const aSort = document.getElementById('adminSortSelector');
            if(aSort) aSort.onchange = () => { currentPageAdmin=1; renderAdminPanel(); };

        });
    </script>
</body>
</html>
